version: 0.0
os: linux
files:
  - source: /
    destination: /home/ec2-user/brandnew
    overwrite: yes

  - permissions:
      object: /
      pattern: "**"
      owner: ec2-user
      group: ec2-user
      mode: 755

  - hooks:
      BeforeInstall:
        - location: scripts/deploy-before.sh
          runas: ec2-user
      ApplicationStart:
        - location: scripts/deploy.sh
          timeout: 60
          runas: ec2-user
        - location: scripts/run_new_was.sh
          timeout: 180
          runas: ec2-user
        - location: scripts/health_check.sh
          timeout: 180
          runas: ec2-user
        - location: scripts/switch.sh
          timeout: 180
          runas: ec2-user